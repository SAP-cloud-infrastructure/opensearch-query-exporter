name: REUSE compliance

on:
  push:
    branches: [main]
  pull_request:
    branches: ["*"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  reuse:
    name: REUSE lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: fsfe/reuse-action@v6
